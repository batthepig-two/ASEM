<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASEM</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <div class="nav-brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5"/>
      <path d="M2 12l10 5 10-5"/>
    </svg>
    ASEM
    <span class="nav-subtitle">ARK Stat &amp; Evolution Manager</span>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-page="helper">Mutation Helper</button>
    <button class="nav-tab" data-page="calc">Stat Calculator</button>
    <button class="nav-tab" data-page="taming">Taming Calculator</button>
    <button class="nav-tab" data-page="howto">How to Use</button>
  </div>
</nav>

<!-- ══ MUTATION HELPER ══ -->
<div class="page active" id="page-helper">
  <div class="lines-header"><h2>Breeding Lines</h2></div>
  <div id="lines-container"></div>
  <button class="add-line-btn" id="add-line-btn"><span>+</span> Add Breeding Line</button>
</div>

<!-- ══ STAT CALCULATOR ══ -->
<div class="page" id="page-calc">
  <div class="calc-layout">
    <div class="calc-panel">
      <h3>Select Dinosaur</h3>
      <input class="calc-search" id="calc-search" type="text" placeholder="Search…" />
      <div class="calc-dino-list" id="calc-dino-list"></div>
    </div>
    <div class="calc-right" id="calc-right">
      <div class="calc-hint">← Select a dinosaur to calculate stats</div>
    </div>
  </div>
</div>

<!-- ══ TAMING CALCULATOR ══ -->
<div class="page" id="page-taming">
  <div class="calc-layout">
    <div class="calc-panel">
      <h3>Select Creature</h3>
      <input class="calc-search" id="taming-search" type="text" placeholder="Search…" />
      <div class="calc-dino-list" id="taming-dino-list"></div>
    </div>
    <div class="calc-right" id="taming-right">
      <div class="calc-hint">← Select a creature to see taming info</div>
    </div>
  </div>
</div>

<!-- ══ HOW TO USE ══ -->
<div class="page" id="page-howto">
  <div id="howto-content"></div>
</div>

<footer>
  ASEM — All data stored locally in your browser · ARK: Survival Evolved &amp; Ascended
</footer>

<script src="script.js"></script>
</body>
</html>
